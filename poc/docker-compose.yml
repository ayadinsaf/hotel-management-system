version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hotel_poc
      - JWT_SECRET=dev_jwt_secret
      - JWT_EXPIRES_IN=24h
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hotel_poc
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: